name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run memory unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci
          TELEGRAM_BOT_TOKEN: ci-test-token
          GOOGLE_API_KEY: ci-test-key
        run: python -m pytest tests/memory -q
